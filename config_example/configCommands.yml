#-------------------------------
# 管理員功能設定：
admin:

  #-----------------------------
  # /公告 指令的設定：
  announcement:

    # 標題使用的 emoji。
    emoji: "📢"


  #-----------------------------
  # /刪除訊息 指令的設定：
  messageDelete:
    emoji: "🗑️"

    # 刪除訊息的最大數量，最多支援一次刪除 100 則訊息。
    deleteLimit: 30


  #-----------------------------
  # /用戶資料 指令的設定：
  userInfo:
    emoji: "👤"


  #-----------------------------
  # Twitch 直播自動通知設定：
  stream:

    # 是否啟用 Twitch 直播自動通知。
    enable: true

    # 要監控的 Twitch 使用者登入名稱，可設定多個。
    twitchUserLogin:
      - " "

    # Twitch Developer Console 中的 Client ID。
    twitchClientID: " "

    # Twitch Developer Console 中的 Client Secret。
    twitchClientSecret: " "

    # 檢查直播狀態的間隔，單位為分鐘。
    checkInterval: 1

    # 更新已發送直播通知的間隔，單位為分鐘。建議配合 Twitch 縮圖更新頻率設為 5 分鐘。
    editInterval: 5

    # 若 Bot 啟動時主播已經在直播，是否立即發送一次通知。
    notifyOnStartupLive: true

    # 發送直播公告時，附加的自定義隨機訊息，可繼續往下延伸。
    message:
      - "現在正直播精彩內容，來一起加入吧！"
      - "直播現在開始！別錯過，一起觀看吧！"
      - "開播啦！一起享受這場直播！"

    # 要發送通知的 Discord 伺服器、頻道與身分組。
    # 若指定伺服器找不到 roleID，將嘗試提及 @everyone。
    # 若沒有設定任何有效 guildID/channelID，將不執行通知。
    targets:
      - guildID: " "
        channelID: " "
        roleID: " "


#-------------------------------
# /關於 相關設定：
about:
  emoji: "🔰"

  # 機器人的暱稱（將用於部分指令，請勿使用大寫英文或空格）
  botNickname: "みやこ"

  # 機器人的介紹
  introduce: "みやこ機器人第三代！\n這是一個基於 discord.js 集合許多功能的綜合型機器人，\n本專案目前仍在積極開發中！"

  # 服務提供者，請填入您的 Discord 數字 ID
  provider: " "

  # 專案連結
  repository: "https://github.com/miguotw/MiYako-DCB"


#-------------------------------
# /延遲 相關設定：
ping:
  emoji: "🏓"


#-------------------------------
# /一言 相關設定：
hitokoto:
  emoji: "🍵"


#-------------------------------
# /物流 相關設定：
packageTracking:
  emoji: "📦"

  # Track.TW API Token，可至會員中心申請。
  trackTwToken: " "

  # 包裹貨態檢查間隔，單位為分鐘。
  checkInterval: 30

  # 貨態訊息超過幾個字後自動截斷並加上 ...
  historyStatusMaxLength: 25

  # 多久沒有新貨態後自動封存，單位為天。
  archiveAfterDays: 14


#-------------------------------
# /網際協定位址資訊 相關設定：
ipQuery:
  emoji: "ℹ️"


#-------------------------------
# /麥塊 相關設定：
minecraft:
  emoji: "🧱"

  #預設列表中的伺服器名稱與 IP，可繼續向下延伸，最多支援 25 個
  defaultServer:
    Hypixel: "mc.hypixel.net"


#-------------------------------
# /時間戳 相關設定：
unixTimestamp:
  emoji: "🕒"
